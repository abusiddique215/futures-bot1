# Gold Bot — VSL Gold Bot screen at ~19:00 (GC1! / 10-minute / COMEX).
#
# Session windows: ALL seven time strings visible in the VSL screenshot are
# encoded here. Three broad sessions + four narrow news-event windows.
#
# Timezone interpretation: ET is assumed (US-resident-trader audience).
# The VSL never labels the timezone — if a future plan verifies CT, change
# `tz` below; the windows themselves are tz-naive `time` strings.
#
# Symbol: MGCH26 (micro Gold, March-2026) — micros are sized for the $50K
# Combine. To trade full GC, change `symbol` and the strategy_params
# `symbol` to a full-GC contract (e.g. GCG26); MeanReversionStrategy + the
# market registry handle the swap without code changes.
#
# Strategy entry rules are NOT revealed by the VSL — see
# docs/superpowers/plans/2026-05-23-plan-17-gold-bot.md for the
# mean-reversion design rationale.
name: gold_bot
enabled: true
symbol: MGCH26
strategy_id: mean_reversion_bb
strategy_params:
  bb_period: 20
  bb_stddev: 2.0
  rsi_period: 14
  rsi_oversold: 30.0
  rsi_overbought: 70.0
  reward_ratio: 1.0
  max_trades_per_day: 3
  symbol: MGCH26
risk_policy: efa_standard
risk_params:
  mll_amount: 2000
schedule_type: custom_windows
schedule_params:
  tz: America/New_York
  windows:
    # Broad sessions
    - ["08:30", "15:00"]   # US regular hours
    - ["23:00", "01:30"]   # Asian overnight (spans midnight; handled)
    - ["08:30", "11:30"]   # US AM session
    - ["11:30", "15:00"]   # US PM session
    # Narrow news-event windows
    - ["08:20", "08:40"]   # Pre-NFP / pre-data
    - ["09:55", "10:10"]   # 10:00 ET data drops
    - ["13:55", "14:15"]   # FOMC-style 14:00 ET
journal_path: state/journal_gold_bot.db
